    var cart = [];
    
    var control = new TomSelect('#locSelect', {
        create: false,
        maxOptions: 500,
        onChange: function(val) {
            if(val) {
                var c = val.split(',');
                var targetLat = parseFloat(c[0]);
                var targetLon = parseFloat(c[1]);

                // 1. Faz o Zoom suave (Nota: map_id usa chaves simples pois é do Python)
                var mapObj = window["map_45ea7b3ed978e1b8296f24a8e5055edc"];
                mapObj.flyTo([targetLat, targetLon], 17, {duration:1.5});

                // 2. Procura a placa exata e abre o popup dela
                setTimeout(function() {
                    mapObj.eachLayer(function(layer) {
                        // Verifica se a camada é um MarkerCluster
                        if (layer instanceof L.MarkerClusterGroup) {
                            layer.eachLayer(function(marker) {
                                // Compara as coordenadas arredondando para evitar erros de precisão do JS
                                if (Math.abs(marker.getLatLng().lat - targetLat) < 0.0001 &&
                                    Math.abs(marker.getLatLng().lng - targetLon) < 0.0001) {
                                    // Aumenta o zoom se estiver dentro de um cluster e abre
                                    layer.zoomToShowLayer(marker, function() {
                                        marker.openPopup();
                                    });
                                }
                            });
                        }
                    });
                }, 1600); // Dispara logo após a animação do flyTo (1.5s) terminar
            }
        }
    });

    function zoomOutOnly() { window["map_45ea7b3ed978e1b8296f24a8e5055edc"].flyTo([-21.76746448580247, -48.183024113580245], 13, {duration:2.0}); control.clear(); }

    function addToCart(unique_id) {
        // 1. Valida e insere no carrinho
        if(cart.includes(unique_id)) { 
            alert("⚠️ Este item já está no seu planejamento!"); 
        }
        else { 
            cart.push(unique_id); 
            updateCartUI(); 
        }
        
        // 2. Fecha o popup automaticamente após o clique
        window["map_45ea7b3ed978e1b8296f24a8e5055edc"].closePopup();
    }

    function removeFromCart(unique_id) {
        cart = cart.filter(id => id !== unique_id);
        updateCartUI();
    }

    function updateCartUI() {
        document.getElementById('count').innerText = cart.length;
        var body = document.getElementById('cartBody');
        if(cart.length === 0) { body.innerHTML = "Nenhum local selecionado."; return; }
        body.innerHTML = cart.map(id => `
            <div class="cart-item">
                <div>
                    <b style="color:#003366">${db[id].codigo_original}</b> - ${db[id].dias} Dias<br>
                    <span style="color:#555">${db[id].local_comercial.substring(0,35)}...</span>
                </div>
                <div style="cursor:pointer; color:red; font-size:16px;" onclick="removeFromCart('${id}')">🗑️</div>
            </div>
        `).join('');
    }

    async function exportAndFilterFinal() {
        if(cart.length === 0) return alert("Adicione locais ao planejamento primeiro!");
        const wb = new ExcelJS.Workbook();
        const ws = wb.addWorksheet('Planejamento de Mídia');

        ws.columns = [
            {header:'CÓDIGO DA MÍDIA', key:'cod'},
            {header:'FORMATO', key:'format'},
            {header:'LOCALIZAÇÃO COMERCIAL', key:'loc'},
            {header:'LATITUDE', key:'lat'},
            {header:'LONGITUDE', key:'lon'},
            {header:'PERIODICIDADE', key:'per'},
            {header:'DIAS VEICULAÇÃO', key:'dias'},
            {header:'IMPACTO DIÁRIO', key:'imp_d'},
            {header:'IMPACTO SEMANAL', key:'imp_s'},
            {header:'IMPACTO TOTAL PERÍODO', key:'imp_t'},
            {header:'CLASSE PREDOMINANTE', key:'perfil'},
            {header:'PODER DE COMPRA', key:'poder'}
        ];

        cart.forEach(id => {
            const item = db[id];
            const row = ws.addRow({
                cod: item.codigo_original,
                format: item.formato,
                loc: item.local_comercial,
                lat: item.lat,
                lon: item.lon,
                per: item.periodicidade,
                dias: item.dias,
                imp_d: item.imp_diario,
                imp_s: item.imp_semanal,
                imp_t: item.imp_total,
                perfil: item.perfil,
                poder: parseFloat(item.poder)
            });

            row.getCell('lat').numFmt = '@'; row.getCell('lon').numFmt = '@';
            row.getCell('imp_d').numFmt = '#,##0'; row.getCell('imp_s').numFmt = '#,##0'; row.getCell('imp_t').numFmt = '#,##0';
            row.getCell('poder').numFmt = '"R$" #,##0.00';
            row.eachCell(c => c.alignment = {horizontal:'center', vertical:'middle'});
        });

        const hRow = ws.getRow(1);
        hRow.height = 25;
        hRow.eachCell(c => { c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'003366'}}; c.font={color:{argb:'FFFFFF'},bold:true}; c.alignment={horizontal:'center',vertical:'middle'}; });
        ws.columns.forEach(col => { col.width = 22; });
