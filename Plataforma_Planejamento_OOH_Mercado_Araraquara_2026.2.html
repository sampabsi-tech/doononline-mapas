    var cart = [];
    
    var control = new TomSelect('#locSelect', {
        create: false,
        maxOptions: 500,
        onChange: function(val) {
            if(val) {
                var targetLat = parseFloat(db[val].lat);
                var targetLon = parseFloat(db[val].lon);

                var mapObj = window["map_3e3ab31e75f7b012a00561f715656575"];
                mapObj.flyTo([targetLat, targetLon], 17, {duration:1.5});

                setTimeout(function() {
                    mapObj.eachLayer(function(layer) {
                        if (layer instanceof L.MarkerClusterGroup) {
                            layer.eachLayer(function(marker) {
                                if (marker.options.title === val) {
                                    layer.zoomToShowLayer(marker, function() {
                                        marker.openPopup();
                                    });
                                }
                            });
                        }
                    });
                }, 1600);

                // --- NOVO AJUSTE: Limpar a caixa após a seleção ---
                this.clear(true); // Limpa o texto selecionado silenciosamente (o 'true' evita loops)
                this.blur();      // Tira o foco da caixa (recolhe a lista e o teclado no telemóvel)
            }
        }
    });

    function zoomOutOnly() { window["map_3e3ab31e75f7b012a00561f715656575"].flyTo([-21.76746448580247, -48.183024113580245], 13, {duration:2.0}); control.clear(); }

    function showToast(msg) {
        var toast = document.getElementById("duplicateToast");
        toast.innerHTML = msg;
        toast.classList.add("show");
        // Destruição do estado 'show' via callback assíncrono (timeout de 3s)
        setTimeout(function() { toast.classList.remove("show"); }, 3000);
    }

    function toggleCart() {
        var content = document.getElementById('cartContent');
        var icon = document.getElementById('cartIcon');
        var header = document.getElementById('cartHeader');
        
        if (content.style.display === 'none') {
            content.style.display = 'block';
            icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            header.style.borderRadius = '10px 10px 0 0';
        } else {
            content.style.display = 'none';
            icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            header.style.borderRadius = '10px';
        }
    }

    function addToCart(unique_id) {
        // Lógica de validação com feedback assíncrono (Toast)
        if(cart.includes(unique_id)) { 
            showToast("⚠️ Atenção: Este local já consta no seu planejamento atual."); 
        }
        else { 
            cart.push(unique_id); 
            updateCartUI(); 
        }
        
        window["map_3e3ab31e75f7b012a00561f715656575"].closePopup();
    }

    function removeFromCart(unique_id) {
        cart = cart.filter(id => id !== unique_id);
        updateCartUI();
    }

    function updateCartUI() {
        var countEl = document.getElementById('count');
        countEl.innerText = cart.length;
        
        // Efeito visual no contador ao adicionar
        countEl.style.transform = 'scale(1.5)';
        countEl.style.color = '#ffeb3b';
        setTimeout(function() { 
            countEl.style.transform = 'scale(1)'; 
            countEl.style.color = 'white'; 
        }, 300);

        var body = document.getElementById('cartBody');
        if(cart.length === 0) { body.innerHTML = "Nenhum local selecionado."; return; }
        body.innerHTML = cart.map(id => `
            <div class="cart-item">
                <div>
                    <b style="color:#003366">${db[id].codigo_original}</b> - ${db[id].dias} Dias<br>
                    <span style="color:#555">${db[id].local_comercial.substring(0,35)}...</span>
                </div>
                <div style="cursor:pointer; color:red; font-size:16px;" onclick="removeFromCart('${id}')">🗑️</div>
            </div>
        `).join('');
    }

    async function exportAndFilterFinal() {
        //if(cart.length === 0) return alert("Adicione locais ao planejamento primeiro!"); - Deixei comentado caso queira fazer testes mais rápidos, basta descomentar e comentar a linha abaixo
        // Lógica de validação customizada baseada em Modal (DOM Manipulation)
        if(cart.length < 25) {
            const required = 25;
            const missing = required - cart.length;
            const percent = (cart.length / required) * 100;
            
            // Interpolação de strings no motor V8 preservada no Python via escapes
            document.getElementById('modalMessage').innerHTML = 
                `Para um planejamento com relevância estatística, recomendamos a seleção de <b>${required} locais</b>.<br><br>` +
                `Você já adicionou <b>${cart.length}</b> ao carrinho. Faltam apenas <b>${missing}</b> para liberar a exportação!`;
            
            // Renderização e animação em stack assíncrono para suavidade
            document.getElementById('exportModal').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('modalProgressBar').style.width = percent + '%';
            }, 50);
            
            return; // Aborta a compilação do Workbook
        }

        const wb = new ExcelJS.Workbook();
        const ws = wb.addWorksheet('Planejamento de Mídia');

        // 1. Ajuste das colunas: Adicionado RANKING (C), Renomeado IMPACTO e Removido PODER DE COMPRA
        ws.columns = [
            {header:'CÓDIGO DA MÍDIA', key:'cod'},
            {header:'FORMATO', key:'format'},
            {header:'RANKING', key:'ranking'},
            {header:'LOGRADOURO', key:'logradouro'},

            {header:'LONGITUDE', key:'lon'},
            {header:'PERIODICIDADE', key:'per'},
            {header:'DIAS VEICULAÇÃO', key:'dias'},
            {header:'IMPACTO ESTIMADO TOTAL', key:'imp_t'},
            {header:'CLASSE PREDOMINANTE', key:'perfil'}
        ];

        const qtdLocais = cart.length;

        cart.forEach(id => {
            const item = db[id];
            const row = ws.addRow({
                cod: item.codigo_original,
                format: item.formato,
                ranking: '', // Inicia vazio para o utilizador preencher
                logradouro: item.logradouro, // <-- Agora usa a variável Logradouro
                lat: item.lat,
                lon: item.lon,
                per: item.periodicidade,
                dias: item.dias,
                imp_t: item.imp_total,       // <-- Diário e Semanal removidos
                perfil: item.perfil
            });

            row.getCell('lat').numFmt = '@'; row.getCell('lon').numFmt = '@';
            row.getCell('imp_t').numFmt = '#,##0'; // Ajuste numérico mantido apenas para o Total
            
           // --- NOVO AJUSTE: Validação Customizada (Bloqueio Hard) ---
            // Usa o COUNTIF para verificar se o número inserido aparece <= 1 vez no intervalo
            row.getCell('ranking').dataValidation = {
                type: 'custom',
                allowBlank: true,
                formulae: [`COUNTIF($C$2:$C$${qtdLocais + 1}, C${row.number})<=1`],
                showErrorMessage: true,
                errorStyle: 'error', // 'error' força o bloqueio e exibe o popup
                errorTitle: 'Ranking Duplicado',
                error: 'Este número de ranking já foi utilizado. Por favor, insira um valor diferente.'
            };

            // --- AJUSTE 2: Desbloqueia APENAS a célula do Ranking para o utilizador editar ---
            row.getCell('ranking').protection = { locked: false };
            
            row.eachCell(c => c.alignment = {horizontal:'center', vertical:'middle'});
        });

        const hRow = ws.getRow(1);
        hRow.height = 25;
        hRow.eachCell(c => { 
            c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'003366'}}; 
            c.font={color:{argb:'FFFFFF'},bold:true}; 
            c.alignment={horizontal:'center',vertical:'middle'}; 
        });
        
        // --- AJUSTE 1: Destaca a Célula C1 (RANKING) com uma cor atrativa ---
        const c1 = ws.getCell('C1');
        c1.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFC000' } }; // Dourado/Laranja
        c1.font = { color: { argb: 'FF000000' }, bold: true }; // Fonte preta para dar contraste

        // --- AJUSTE 3: Auto-ajuste inteligente da largura das colunas ---
        ws.columns.forEach(column => {
            let maxLength = 0;
            column.eachCell({ includeEmpty: true }, cell => {
                let columnLength = cell.value ? cell.value.toString().length : 10;
                if (columnLength > maxLength) {
                    maxLength = columnLength;
                }
            });
            // Threshold superior ampliado para 120 caracteres e margem ajustada (+3)
            column.width = maxLength > 120 ? 120 : (maxLength < 15 ? 15 : maxLength + 3);
        });

        // --- AJUSTE 2 (Conclusão): Protege a planilha inteira (a senha é 'dooh') ---
        await ws.protect('dooh', { selectLockedCells: true, selectUnlockedCells: true });

        saveAs(new Blob([await wb.xlsx.writeBuffer()]), 'Locais Selecionados.xlsx');

        var cluster = window["marker_cluster_4a469970e85afd01835c749e7d1f2fa3"];
        cluster.getLayers().forEach(m => { if(!cart.includes(m.options.title)) cluster.removeLayer(m); });

        var allOptions = Object.keys(control.options);
        allOptions.forEach(opt => {
            // Como "opt" agora é o unique_id, basta verificar direto se ele está no carrinho
            if(!cart.includes(opt)) control.removeOption(opt);
        });
        control.refreshOptions(false);
        zoomOutOnly();
    }
</script>
